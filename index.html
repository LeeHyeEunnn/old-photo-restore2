<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사진 복원 사이트</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
    img {
      max-width: 300px;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>📸 사진 복원 사이트</h1>

  <input type="file" id="upload">
  <br>
  <img id="preview" />

  <br>
  <button onclick="restore()">복원하기</button>

  <script>
    const upload = document.getElementById('upload');
    const preview = document.getElementById('preview');

     upload.addEventListener('change', () => {
        const file = upload.files[0];
        preview.src = URL.createObjectURL(file);
    });

     function restore() {
     preview.style.filter = "contrast(120%) brightness(110%)";
    
     alert("사진이 복원되었습니다!");
    }
    </script>

</body>
</html>
